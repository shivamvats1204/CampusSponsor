<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | CampusSponsor</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/app.js" defer></script>
    <script src="/js/pages/admin.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div data-nav></div>
    </header>
    <main class="page-shell">
      <section class="hero" id="adminHero"></section>
      <section class="section">
        <div class="stats-grid" id="adminSummary"></div>
      </section>
      <section class="section grid-2">
        <div class="panel">
          <div class="section-header">
            <h2 class="section-title">Pending Events</h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Event</th>
                  <th>Club</th>
                  <th>Date</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="pendingEventsTable"></tbody>
            </table>
          </div>
        </div>
        <div class="panel">
          <div class="section-header">
            <h2 class="section-title">Users</h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Role</th>
                  <th>Email</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="usersTable"></tbody>
            </table>
          </div>
        </div>
      </section>
      <div id="adminNotice" class="notice"></div>
    </main>
  </body>
</html>
