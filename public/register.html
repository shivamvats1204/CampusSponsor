<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | CampusSponsor</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/app.js" defer></script>
    <script src="/js/pages/register.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div data-nav></div>
    </header>
    <main class="page-shell">
      <section class="hero">
        <div class="hero-grid">
          <div>
            <span class="eyebrow">Create your account</span>
            <h1>Set up your club or sponsor profile in one pass.</h1>
            <p>Role-aware onboarding keeps the form short while still capturing the details needed for matchmaking.</p>
          </div>
          <div class="hero-aside">
            <strong>Profiles supported</strong>
            <div class="stack mt-08">
              <div class="list-item"><strong>Club</strong><div class="small muted">College, audience, and event track record.</div></div>
              <div class="list-item"><strong>Company</strong><div class="small muted">Industry, goals, and budget range.</div></div>
            </div>
          </div>
        </div>
      </section>
      <section class="section">
        <div class="form-card">
          <h2 class="section-title">Registration</h2>
          <form id="registerForm" class="form-grid">
            <div class="field">
              <label for="name">Contact Name</label>
              <input id="name" name="name" required />
            </div>
            <div class="field">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" required />
            </div>
            <div class="field">
              <label for="password">Password</label>
              <input id="password" name="password" type="password" required />
            </div>
            <div class="field">
              <label for="role">Role</label>
              <select id="role" name="role">
                <option value="club">Club</option>
                <option value="company">Company</option>
              </select>
            </div>
            <div id="clubFields" class="grid-2 full-span">
              <div class="field">
                <label for="collegeName">College Name</label>
                <input id="collegeName" name="collegeName" />
              </div>
              <div class="field">
                <label for="clubName">Club Name</label>
                <input id="clubName" name="clubName" />
              </div>
              <div class="field">
                <label for="audienceSize">Audience Size</label>
                <input id="audienceSize" name="audienceSize" type="number" min="0" />
              </div>
              <div class="field full">
                <label for="description">Club Description</label>
                <textarea id="description" name="description"></textarea>
              </div>
              <div class="field full">
                <label for="pastEvents">Past Events</label>
                <textarea id="pastEvents" name="pastEvents"></textarea>
              </div>
            </div>
            <div id="companyFields" class="grid-2 hidden full-span">
              <div class="field">
                <label for="companyName">Company Name</label>
                <input id="companyName" name="companyName" />
              </div>
              <div class="field">
                <label for="industry">Industry</label>
                <input id="industry" name="industry" />
              </div>
              <div class="field full">
                <label for="marketingGoals">Marketing Goals</label>
                <textarea id="marketingGoals" name="marketingGoals"></textarea>
              </div>
              <div class="field">
                <label for="budgetRange">Budget Range</label>
                <input id="budgetRange" name="budgetRange" placeholder="e.g. INR 1,000 - INR 5,00,000"/>
              </div>
            </div>
            <div class="field full">
              <button class="button" type="submit">Create Account</button>
            </div>
          </form>
          <div id="registerNotice" class="notice"></div>
        </div>
      </section>
    </main>
  </body>
</html>
