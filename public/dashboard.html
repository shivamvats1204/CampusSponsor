<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | CampusSponsor</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/app.js" defer></script>
    <script src="/js/pages/dashboard.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div data-nav></div>
    </header>
    <main class="page-shell">
      <section class="hero" data-dashboard-hero></section>
      <section class="section">
        <div class="stats-grid" data-summary></div>
      </section>
      <section class="section grid-2">
        <div class="panel">
          <div class="section-header">
            <h2 class="section-title" data-primary-title>Overview</h2>
          </div>
          <div class="list" data-primary-list></div>
        </div>
        <div class="panel">
          <div class="section-header">
            <h2 class="section-title" data-secondary-title>Details</h2>
          </div>
          <div class="list" data-secondary-list></div>
        </div>
      </section>
      <div id="dashboardNotice" class="notice"></div>
    </main>
  </body>
</html>
